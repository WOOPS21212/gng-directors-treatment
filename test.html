<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staging Test Page</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0A0E2A;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

.container {
  text-align: center;
  position: relative;
  z-index: 1;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 12vw, 10rem);
  color: #fff;
  letter-spacing: 0.05em;
  line-height: 1;
  animation: dropIn 0.6s ease-out;
}

.subtitle {
  font-size: clamp(1rem, 3vw, 1.4rem);
  color: #6B7280;
  margin-top: 12px;
  animation: fadeIn 1s ease-out 0.4s both;
}

.badge {
  display: inline-block;
  margin-top: 32px;
  padding: 10px 28px;
  border-radius: 100px;
  background: linear-gradient(135deg, #2B4AE8, #FF6B35);
  color: #fff;
  font-weight: 600;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  animation: fadeIn 1s ease-out 0.8s both;
}

.ping {
  width: 12px;
  height: 12px;
  background: #4ade80;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
  animation: pulse 1.5s ease-in-out infinite;
  vertical-align: middle;
}

/* floating shapes */
.shape {
  position: fixed;
  border-radius: 50%;
  opacity: 0.08;
  animation: float 8s ease-in-out infinite;
}
.shape:nth-child(1) { width:300px; height:300px; background:#2B4AE8; top:-80px; left:-80px; animation-delay:0s; }
.shape:nth-child(2) { width:200px; height:200px; background:#FF6B35; bottom:-60px; right:-60px; animation-delay:2s; }
.shape:nth-child(3) { width:150px; height:150px; background:#2B4AE8; bottom:20%; left:10%; animation-delay:4s; }
.shape:nth-child(4) { width:100px; height:100px; background:#FF6B35; top:15%; right:15%; animation-delay:1s; }

@keyframes dropIn {
  0% { transform: translateY(-60px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(16px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.6; }
}

@keyframes float {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(20px, -30px) scale(1.1); }
}
</style>
</head>
<body>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="container">
    <h1>IT WORKS</h1>
    <p class="subtitle">Staging is live. You're looking at the test page.</p>
    <div class="badge"><span class="ping"></span> Staging Connected</div>
  </div>
</body>
</html>
